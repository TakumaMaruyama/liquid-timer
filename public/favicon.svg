<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">プールサイドタイマー</title>
  <desc id="desc">プールとタイマーを組み合わせたアプリアイコン</desc>
  <defs>
    <linearGradient id="bg" x1="18" y1="10" x2="110" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d2f46" />
      <stop offset="1" stop-color="#04111d" />
    </linearGradient>
    <linearGradient id="water" x1="64" y1="54" x2="64" y2="102" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7bedff" />
      <stop offset="1" stop-color="#149ed0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
  </defs>

  <rect x="6" y="6" width="116" height="116" rx="30" fill="url(#bg)" />
  <ellipse cx="38" cy="28" rx="26" ry="16" fill="#70ddff" fill-opacity=".25" filter="url(#glow)" />

  <circle cx="64" cy="47" r="28" fill="none" stroke="#f3fbff" stroke-width="8" />
  <circle cx="64" cy="19" r="5" fill="#7bedff" />

  <path
    d="M35 68
       C43 62 50 72 58 67
       C65 62 73 71 81 66
       C86 63 90 64 93 62
       V84
       C93 94 84 102 74 102
       H54
       C43 102 35 94 35 84
       Z"
    fill="url(#water)"
  />

  <rect x="41" y="72" width="46" height="6" rx="3" fill="#f3fbff" fill-opacity=".2" />
  <rect x="41" y="81" width="46" height="6" rx="3" fill="#f3fbff" fill-opacity=".24" />
  <rect x="41" y="90" width="46" height="6" rx="3" fill="#f3fbff" fill-opacity=".28" />
</svg>
